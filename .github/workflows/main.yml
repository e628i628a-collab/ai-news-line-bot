name: AI News LINE BOT

on:
  schedule:
    # UTCの 23:07 （日本時間の午前 8:07）
    # 混雑（0分）を避けるために7分にズラしています
    - cron: '7 23 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run BOT
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python techcrunch_ai_line.py
          python x_test.py

      - name: Commit updated last_sent.txt
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add last_sent.txt

          git diff --cached --quiet || git commit -m "Update last sent articles"

          git push

